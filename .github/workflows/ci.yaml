name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - README.md
      - README_zh-CN.md
      - LICENSE

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v3
      - name: Start database
        run: docker compose -f ./docker-compose.db.yaml up -d
        working-directory: .
      - name: Set up go
        uses: actions/setup-go@v3
        with:
          go-version: '1.26.2'
      - name: Test
        run: go test ./...
  
  create-release:
    needs: go-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Create Release Package 
        run: |
          mkdir -p dist
          zip -r dist/ktauth_${{ github.ref_name }}.zip docker-compose.yaml init/00-init.sql

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
