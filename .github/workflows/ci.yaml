name: CI

on:
  push:
    branches:
      - dev
    paths-ignore:
      - README.md
      - README_zh-CN.md
      - LICENSE

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v3
      - name: Start database
        run: docker compose -f ./docker-compose.yaml -f ./docker-compose.db.yaml up -d
        working-directory: .
      - name: Set up go
        uses: actions/setup-go@v3
        with:
          go-version: '1.26.2'
      - name: Test
        run: go test ./...
