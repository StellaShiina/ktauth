services:
  mysql:
    container_name: ktauth-db
    image: mysql:latest
    volumes:
      - mysql:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_DATABASE=ktauth
      - MYSQL_ROOT_PASSWORD=ktauth-admin
      - MYSQL_USER=ktauth
      - MYSQL_PASSWORD=ktauth
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "ktauth", "-pktauth"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  redis:
    container_name: ktauth-redis
    image: redis:latest
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  mysql: