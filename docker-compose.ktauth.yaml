services:
  ktauth:
    container_name: ktauth
    image: stellashiina/ktauth:latest
    ports:
      - "127.0.0.1:10000:10000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - resend.env
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - GIN_MODE=release