name = "ktauth"
main = "worker.ts"
compatibility_date = "2026-04-22"

[build]
command = """
mkdir -p scripts
cp ../install.sh scripts/
cp ../docker-compose.yaml scripts/
cp ../init/00-init.sql scripts/
cp ../.env.example scripts/
"""

[assets]
directory = "./scripts"
binding = "ASSETS"
not_found_handling = "404-page"

[observability]
enabled = true