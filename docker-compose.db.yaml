services:
  db:
    container_name: ktauth-db
    image: postgres:latest
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=ktauth
      - POSTGRES_PASSWORD=ktauth
      - POSTGRES_USER=ktauth
    restart: always
  redis:
    container_name: ktauth-redis
    image: redis:latest
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
volumes:
  postgres_data:
